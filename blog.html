<!DOCTYPE html>
<html lang="en">
<head>
  <title>Blog - Youth Against Valley Fever</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="index.css">
  <script src="https://kit.fontawesome.com/8eb1be9af7.js" crossorigin="anonymous"></script>
</head>
<body class="blog-page-body">
  <div class="home-container1">
    <nav class="navigation-root">
      <div class="navigation-container">
        <a href="index.html">
          <div class="navigation-logo-wrapper">
            <img src="public/logo.png" class="navigation-logo" alt="Logo">
          </div>
        </a>
      </div>
      <div class="nav-blog-wrapper">
        <a href="blog.html" class="blog-button">
          <span>Blog</span>
          <i class="fa-solid fa-pen-nib"></i>
        </a>
      </div>
    </nav>

    <header class="blog-header">
      <h1 class="section-title">The VF Notebook</h1>
      <p class="section-content">Stories, updates, and news from the field.</p>
    </header>

    <main class="blog-feed-container" id="blog-posts-container">
      <p class="section-content">Loading the latest stories...</p>
    </main>

    </div>

    <script>
        // Replace these with your actual info
        const username = 'ryo3167';
        const repo = 'youth-against-vf';
        const folder = 'content/blog'; // The folder where your posts are saved

        async function loadPosts() {
            const container = document.getElementById('blog-posts-container');
            try {
            // 1. Get the list of files from GitHub
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
            const files = await response.json();

            container.innerHTML = ''; // Clear the "Loading" text

            // 2. Loop through each file and display it
            for (const file of files) {
                if (file.name.endsWith('.md')) { // Decap CMS saves as Markdown (.md)
                const contentResponse = await fetch(file.download_url);
                const text = await contentResponse.text();
                
                // Create a simple preview for each post
                const postElement = document.createElement('article');
                postElement.innerHTML = `
                    <h2>${file.name.replace('.md', '').replace(/-/g, ' ')}</h2>
                    <div>${text.substring(0, 200)}...</div>
                    <hr>
                `;
                container.appendChild(postElement);
                }
            }
            } catch (error) {
            console.error('Error loading posts:', error);
            container.innerHTML = '<p>Could not load posts. Check back soon!</p>';
            }
        }

        loadPosts();
    </script>

</body>
</html>
